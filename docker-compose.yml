services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=8000
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CONTACT_RECEIVER_EMAIL=${CONTACT_RECEIVER_EMAIL}
    ports:
      - "8000:8000"
    volumes:
      - u2net_data:/root/.u2net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BACKEND_URL=${BACKEND_URL}
    environment:
      - NODE_ENV=production
      - BACKEND_URL=${BACKEND_URL}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  u2net_data:
